on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Vite GitHub Pages Deployer
        uses: skywarth/vite-github-pages-deployer@v1.5.0
        with:
          public_base_path: /
          build_path: ./dist
        env:
          VITE_SUPABASE_URL: https://uhifhoivfqcizuwbctft.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_0kp6uuiyqt2nq5D7SYGQLQ_xuPaYb2b
